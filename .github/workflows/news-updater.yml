name: 🤖 Автообновление новостей Cognify AI

on:
  schedule:
    # ИСПРАВЛЕНО: используем "некруглое" время
    - cron: '17 */1 * * *'  # Каждые 3 часа в 17 минут
    - cron: '43 10,16,22 * * *'  # Дополнительно в 10:43, 16:43, 22:43
  workflow_dispatch:  # ОБЯЗАТЕЛЬНО для ручного запуска

permissions:
  contents: write
  actions: read

concurrency:
  group: news-generator
  cancel-in-progress: false

jobs:
  generate-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: 🔄 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai
          python -c "import google; print('✅ Google GenAI installed')"
      
      - name: 🚀 Generate news with Gemini
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "🔄 Starting news generation at $(date)"
          python news_generator.py
          
          if [ -f news.json ]; then
            SIZE=$(wc -c < news.json)
            echo "✅ News generated successfully (${SIZE} bytes)"
          else
            echo "❌ news.json not created"
            exit 1
          fi
      
      - name: 💾 Commit and push changes
        run: |
          git config user.name "Cognify AI Bot"
          git config user.email "bot@cognify.ai"
          
          git add news.json
          
          if git diff --cached --quiet; then
            echo "📝 No changes to commit"
            exit 0
          fi
          
          git commit -m "🤖 Auto-update AI news [skip ci]"
          
          for i in 1 2 3; do
            if git pull --rebase origin main && git push origin main; then
              echo "✅ Changes pushed successfully"
              break
              
            fi
            sleep 5
          done
