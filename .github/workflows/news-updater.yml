name: News Auto Updater

on:
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install google-genai requests beautifulsoup4
      
      - name: Generate news
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python news_generator.py
      
      - name: Commit and push
        run: |
          git config user.name "Cognify AI Bot"
          git config user.email "bot@cognify.ai"
          git add news.json news/ sitemap.xml robots.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "🤖 Auto-update news [skip ci]"
          git push origin main
