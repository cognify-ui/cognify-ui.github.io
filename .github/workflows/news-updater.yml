name: Автообновление новостей

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  generate-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install requests feedparser
      
      - run: python news_generator.py
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --staged --quiet || git commit -m "🤖 Автообновление новостей [skip ci]"
          git pull --rebase --strategy-option=theirs origin main || true
          git push origin main
