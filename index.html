    const languages = { ru: '🇷🇺 Русский', en: '🇬🇧 English' };
    
    function t(key) { return translations[currentLang]?.[key] || translations.ru[key] || key; }
    function showToast(msg, isError) { const toast = document.createElement('div'); toast.className = 'toast'; toast.style.background = isError ? '#dc3545' : '#212529'; toast.innerHTML = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2500); }
    function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function formatMessage(text) { if (!text) return ''; return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>'); }
    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast('Скопировано!')); }
    function formatNumber(num) { if (num >= 1000000) return (num/1000000).toFixed(1)+'M'; if (num>=1000) return (num/1000).toFixed(1)+'K'; return num.toString(); }
    function formatDate(dateStr) { if (!dateStr) return t('unknown_date'); const date = new Date(dateStr); if (isNaN(date.getTime())) return t('unknown_date'); const now = new Date(), diff = now - date, days = Math.floor(diff / (1000*60*60*24)); if (days === 0) return t('today'); if (days === 1) return t('yesterday'); if (days < 7) return `${days} ${t('days_ago')}`; return date.toLocaleDateString(); }
    
    function updateWelcomeMessage() {
        const welcomeDiv = document.getElementById('welcomeMessage');
        if (welcomeDiv) welcomeDiv.innerHTML = marked.parse(`<p><strong>${t('welcome_title')}</strong></p><p>${t('welcome_context')}</p><p><strong>${t('models_title')}</strong><br>• ${t('model_groq')}<br>• ${t('model_cerebras')}<br>• ${t('model_cloudflare')}<br>• ${t('model_gemini')}</p><p>${t('news_hint')}</p>`);
    }
    function updateUILanguage() { document.getElementById('userInput').placeholder = t('placeholder'); document.getElementById('sendBtn').innerHTML = t('send'); updateWelcomeMessage(); }
    function switchLanguage(lang) { currentLang = lang; localStorage.setItem('language', lang); document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang)); updateUILanguage(); }
    
    function loadUserData() {
        const key = currentUser ? `chats_${currentUser}` : 'chats_guest';
        const saved = localStorage.getItem(key);
        chats = saved ? JSON.parse(saved) : {};
        if (Object.keys(chats).length === 0) createNewChat();
        else { const lastKey = currentUser ? `lastChatId_${currentUser}` : 'lastChatId_guest'; const lastId = localStorage.getItem(lastKey); if (lastId && chats[lastId]) currentChatId = lastId; else currentChatId = Object.keys(chats)[0]; loadChat(currentChatId); }
        renderHistory();
    }
    function saveUserData() { const key = currentUser ? `chats_${currentUser}` : 'chats_guest'; localStorage.setItem(key, JSON.stringify(chats)); localStorage.setItem(currentUser ? `lastChatId_${currentUser}` : 'lastChatId_guest', currentChatId); }
    function updateUserUI() {
        const avatar = document.getElementById('userAvatar');
        const nameSpan = document.querySelector('#userNameDisplay');
        if (currentUser) { avatar.innerHTML = currentUser.charAt(0).toUpperCase(); if (nameSpan) nameSpan.innerHTML = `👤 ${currentUser}`; }
        else { avatar.innerHTML = '👤'; if (nameSpan) nameSpan.innerHTML = `👤 ${t('guest')}`; }
        document.getElementById('logoutMenuItem').style.display = currentUser ? 'flex' : 'none';
    }
    function createNewChat() { currentChatId = Date.now().toString(); chats[currentChatId] = { id: currentChatId, title: 'Новый чат', messages: [{ role: 'bot', content: 'Привет! Я Cognify AI. Задай любой вопрос!' }], createdAt: new Date().toISOString() }; saveUserData(); renderHistory(); loadChat(currentChatId); showToast('✨ Новый чат'); }
    function loadChat(chatId) { currentChatId = chatId; const chat = chats[chatId]; if (!chat) return; document.getElementById('chatTitle').innerText = chat.title; const messagesArea = document.getElementById('messagesArea'); messagesArea.innerHTML = ''; chat.messages.forEach(msg => addMessageToUI(msg.content, msg.role === 'user')); document.querySelectorAll('.history-item').forEach(el => { el.classList.remove('active'); if (el.dataset.id === chatId) el.classList.add('active'); }); }
    
    async function addMessageToUI(text, isUser) {
        const messagesArea = document.getElementById('messagesArea');
        const div = document.createElement('div');
        div.className = `message ${isUser ? 'user' : 'bot'}`;
        let content = text;
        if (!isUser) { try { content = await marked.parse(text); } catch(e) { content = formatMessage(text); } }
        else { content = formatMessage(text); }
        div.innerHTML = `<div class="message-avatar">${isUser ? '👤' : '🧠'}</div><div class="message-content">${content}</div>`;
        if (!isUser) {
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';
            actionsDiv.innerHTML = `<button class="action-btn">📋 Копировать</button>`;
            actionsDiv.querySelector('.action-btn').onclick = () => { navigator.clipboard.writeText(text); showToast('Скопировано!'); };
            div.querySelector('.message-content').appendChild(actionsDiv);
            div.addEventListener('mouseenter', () => actionsDiv.style.opacity = '1');
            div.addEventListener('mouseleave', () => actionsDiv.style.opacity = '0.7');
        }
        messagesArea.appendChild(div);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }
    
    function saveAndAddMessage(text, isUser) {
        const chat = chats[currentChatId];
        if (chat) {
            chat.messages.push({ role: isUser ? 'user' : 'bot', content: text });
            if (chat.messages.filter(m => m.role === 'user').length === 1 && isUser) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                document.getElementById('chatTitle').innerText = chat.title;
            }
            saveUserData();
            renderHistory();
            if (isUser) { totalMessages++; localStorage.setItem('totalMessages', totalMessages); document.getElementById('statsCount').innerText = totalMessages; }
        }
        addMessageToUI(text, isUser);
    }
    
    function renderHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '';
        const sorted = Object.values(chats).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        sorted.forEach(chat => {
            const item = document.createElement('div');
            item.className = 'history-item' + (chat.id === currentChatId ? ' active' : '');
            item.dataset.id = chat.id;
            item.innerHTML = `<span class="history-title">${escapeHtml(chat.title)}</span><div class="history-actions"><button class="history-btn" onclick="event.stopPropagation(); window.openShareModal('${chat.id}')">🔗</button><button class="history-btn" onclick="event.stopPropagation(); window.deleteChat('${chat.id}')">🗑️</button></div>`;
            item.onclick = () => loadChat(chat.id);
            historyList.appendChild(item);
        });
    }
    
    function showConfirmModal(title, message, onConfirm) {
        const modal = document.getElementById('customConfirmModal');
        document.getElementById('confirmTitle').innerText = title;
        document.getElementById('confirmMessage').innerText = message;
        window._confirmCallback = onConfirm;
        modal.classList.add('show');
    }
    
    window.deleteChat = function(chatId) {
        showConfirmModal('Удалить чат', 'Вы уверены, что хотите удалить этот чат?', () => {
            delete chats[chatId];
            saveUserData();
            const remaining = Object.keys(chats);
            if (remaining.length === 0) createNewChat();
            else loadChat(remaining[0]);
            renderHistory();
            showToast('Чат удалён');
        });
    };
    
    function updateCurrentModelBadge() { document.getElementById('currentModelName').innerHTML = modelNames[currentApi] || currentApi; }
    function switchApi(api) { currentApi = api; localStorage.setItem('currentApi', api); document.querySelectorAll('.api-btn').forEach(btn => { btn.classList.remove('active'); if (btn.dataset.api === api) btn.classList.add('active'); }); updateCurrentModelBadge(); saveAndAddMessage(`Переключено на ${modelNames[api]}`, false); }
    function showTypingIndicator() { const messagesArea = document.getElementById('messagesArea'); const typingDiv = document.createElement('div'); typingDiv.className = 'message bot'; typingDiv.id = 'typing-indicator'; typingDiv.innerHTML = `<div class="message-avatar">🧠</div><div class="message-content"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`; messagesArea.appendChild(typingDiv); messagesArea.scrollTop = messagesArea.scrollHeight; }
    function hideTypingIndicator() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }
    
    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('userInput');
        const question = input.value.trim();
        if (!question) return;
        saveAndAddMessage(question, true);
        input.value = '';
        input.style.height = 'auto';
        const chat = chats[currentChatId];
        if (!chat) return;
        const conversationHistory = [];
        const lastMessages = chat.messages.slice(-10);
        for (const msg of lastMessages) {
            if (msg.role === 'user') conversationHistory.push({ role: 'user', content: msg.content });
            else if (msg.role === 'bot' && !msg.content.includes('Переключено на')) conversationHistory.push({ role: 'assistant', content: msg.content });
        }
        conversationHistory.push({ role: 'user', content: question });
        showTypingIndicator();
        isLoading = true;
        const sendBtn = document.getElementById('sendBtn');
        sendBtn.disabled = true;
        if (abortController) abortController.abort();
        abortController = new AbortController();
        let answer;
        try {
            const timeoutId = setTimeout(() => abortController.abort(), 60000);
            const response = await fetch(`${WORKER_URL}/chat`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ messages: conversationHistory, api: currentApi }), signal: abortController.signal });
            clearTimeout(timeoutId);
            const data = await response.json();
            answer = data.answer || data.error || 'Ошибка API';
        } catch (err) { answer = err.name === 'AbortError' ? '⏹️ Запрос прерван.' : `Ошибка: ${err.message}`; }
        abortController = null;
        hideTypingIndicator();
        saveAndAddMessage(answer, false);
        isLoading = false;
        sendBtn.disabled = false;
    }
    
    function saveNewsStats() { localStorage.setItem('newsStats', JSON.stringify(newsStats)); }
    window.likeArticle = function(articleId, btn) {
        if (!newsStats[articleId]) newsStats[articleId] = { views: 0, likes: 0 };
        const likedKey = `liked_${articleId}`;
        const isLiked = localStorage.getItem(likedKey) === 'true';
        if (isLiked) { newsStats[articleId].likes--; localStorage.removeItem(likedKey); btn.classList.remove('liked'); showToast(t('like_removed')); }
        else { newsStats[articleId].likes++; localStorage.setItem(likedKey, 'true'); btn.classList.add('liked'); showToast(t('like_added')); }
        saveNewsStats();
        const likesSpan = document.getElementById(`likes-${articleId}`);
        if (likesSpan) likesSpan.textContent = formatNumber(newsStats[articleId].likes);
    };
    function renderNewsList() {
        const newsListDiv = document.getElementById('newsList');
        if (!newsListDiv) return;
        if (allNews.length === 0) { newsListDiv.innerHTML = `<div class="news-empty">${t('no_news')}</div>`; return; }
        newsListDiv.innerHTML = allNews.map(article => `<div class="news-card" onclick="window.showFullArticle('${article.id}')"><h3>${escapeHtml(article.title)}</h3><div class="news-meta"><span>📅 ${formatDate(article.published_at)}</span></div><div class="news-summary">${escapeHtml((article.summary || article.content || '').substring(0, 150))}...</div><div class="news-stats"><div class="news-stat ${localStorage.getItem(`liked_${article.id}`) === 'true' ? 'liked' : ''}" onclick="event.stopPropagation(); window.likeArticle('${article.id}', this)">❤️ <span id="likes-${article.id}">${formatNumber(newsStats[article.id]?.likes || 0)}</span></div></div></div>`).join('');
        const lastVisit = localStorage.getItem('lastNewsVisit') || 0;
        const newCount = allNews.filter(n => new Date(n.published_at) > new Date(lastVisit)).length;
        if (newCount > 0) { document.getElementById('newsBadge').textContent = newCount; document.getElementById('newsBadge').style.display = 'inline'; }
        localStorage.setItem('lastNewsVisit', new Date().toISOString());
    }
    window.showFullArticle = function(articleId) { const article = allNews.find(a => a.id === articleId); if (!article) return; let modal = document.getElementById('articleModal'); if (!modal) { modal = document.createElement('div'); modal.id = 'articleModal'; modal.className = 'article-modal'; modal.innerHTML = `<div class="article-modal-content"><button class="close-article-modal" onclick="window.closeArticleModal()">✖</button><div id="articleModalBody"></div></div>`; document.body.appendChild(modal); } document.getElementById('articleModalBody').innerHTML = `<h2>${escapeHtml(article.title)}</h2><div style="margin:16px 0">${escapeHtml(article.content || article.summary || '')}</div>`; modal.classList.add('show'); };
    window.closeArticleModal = function() { const modal = document.getElementById('articleModal'); if (modal) modal.classList.remove('show'); };
    async function loadNews() {
        const newsListDiv = document.getElementById('newsList');
        if (newsListDiv) newsListDiv.innerHTML = '<div class="skeleton-card"><div class="skeleton-title"></div><div class="skeleton-meta"></div><div class="skeleton-text"></div></div>';
        try {
            const response = await fetch('news.json?t=' + Date.now());
            if (!response.ok) throw new Error();
            const data = await response.json();
            allNews = (data.articles || []).map(a => ({ ...a, id: a.id || Date.now() + Math.random().toString(36) }));
            renderNewsList();
        } catch(error) { if (newsListDiv) newsListDiv.innerHTML = `<div class="news-empty">${t('load_error')}</div>`; }
    }
    
    window.toggleSidebar = function() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebarOverlay').classList.toggle('show'); };
    window.closeSidebar = function() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
    window.toggleUserMenu = function() { document.getElementById('userMenu').classList.toggle('show'); };
    window.showNewsTab = function() { document.getElementById('messagesArea').style.display = 'none'; document.querySelector('.input-area').style.display = 'none'; document.getElementById('newsContainer').style.display = 'block'; loadNews(); document.getElementById('newsBadge').style.display = 'none'; if (window.innerWidth <= 768) window.closeSidebar(); };
    window.closeNewsTab = function() { document.getElementById('messagesArea').style.display = 'block'; document.querySelector('.input-area').style.display = 'flex'; document.getElementById('newsContainer').style.display = 'none'; };
    window.openShareModal = function(chatId) { shareChatId = chatId; document.getElementById('shareLinkInput').value = window.location.origin + window.location.pathname + '?share=' + chatId; document.getElementById('shareModal').classList.add('show'); };
    function closeShareModal() { document.getElementById('shareModal').classList.remove('show'); }
    function copyChatLink() { copyToClipboard(document.getElementById('shareLinkInput').value); }
    function getChatText() { const chat = chats[shareChatId]; if (!chat) return ''; return chat.messages.map(m => `${m.role === 'user' ? '👤' : '🧠'}: ${m.content}`).join('\n\n').substring(0, 2000); }
    function shareToTelegram() { window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(getChatText())}`, '_blank'); }
    function shareToWhatsApp() { window.open(`https://wa.me/?text=${encodeURIComponent(getChatText() + '\n\n' + window.location.href)}`, '_blank'); }
    function shareToVK() { window.open(`https://vk.com/share.php?url=${encodeURIComponent(window.location.href)}&title=Cognify%20AI`, '_blank'); }
    function shareToTwitter() { window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(getChatText().substring(0, 280))}&url=${encodeURIComponent(window.location.href)}`, '_blank'); }
    
    function showAuthModal() { authMode = 'login'; document.getElementById('authTitle').innerHTML = '🔐 Вход'; document.getElementById('authSubmitBtn').innerHTML = 'Войти'; document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться'; document.getElementById('authModal').classList.add('show'); }
    function toggleAuthMode() { if (authMode === 'login') { authMode = 'register'; document.getElementById('authTitle').innerHTML = '📝 Регистрация'; document.getElementById('authSubmitBtn').innerHTML = 'Зарегистрироваться'; document.getElementById('authSwitch').innerHTML = 'Уже есть аккаунт? Войти'; } else { authMode = 'login'; document.getElementById('authTitle').innerHTML = '🔐 Вход'; document.getElementById('authSubmitBtn').innerHTML = 'Войти'; document.getElementById('authSwitch').innerHTML = 'Нет аккаунта? Зарегистрироваться'; } }
    function authSubmit() {
        const username = document.getElementById('authUsername').value.trim();
        const password = document.getElementById('authPassword').value;
        if (!username || !password) { showToast('Заполните все поля', true); return; }
        const users = JSON.parse(localStorage.getItem('users') || '{}');
        if (authMode === 'register') {
            if (users[username]) { showToast('Пользователь существует', true); return; }
            if (password.length < 4) { showToast('Пароль минимум 4 символа', true); return; }
            users[username] = password;
            localStorage.setItem('users', JSON.stringify(users));
            showToast('Регистрация успешна!');
            toggleAuthMode();
        } else {
            if (users[username] !== password) { showToast('Неверный логин или пароль', true); return; }
            currentUser = username;
            localStorage.setItem('currentUser', username);
            updateUserUI();
            loadUserData();
            showToast(`Добро пожаловать, ${username}!`);
            document.getElementById('authModal').classList.remove('show');
        }
        document.getElementById('authUsername').value = '';
        document.getElementById('authPassword').value = '';
    }
    function logout() { showConfirmModal('Выход', 'Вы уверены, что хотите выйти?', () => { currentUser = null; localStorage.removeItem('currentUser'); updateUserUI(); loadUserData(); showToast('Вы вышли'); }); }
    function clearAllData() { showConfirmModal('⚠️ Очистка всех данных', 'Все чаты и история будут удалены без возможности восстановления. Продолжить?', () => { chats = {}; createNewChat(); saveUserData(); renderHistory(); totalMessages = 0; localStorage.setItem('totalMessages', '0'); document.getElementById('statsCount').innerText = '0'; showToast('Все данные очищены'); }); }
    function exportAllChats() { const data = JSON.stringify(chats, null, 2); const blob = new Blob([data], { type: 'application/json' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `cognify-chats-${Date.now()}.json`; a.click(); URL.revokeObjectURL(url); showToast('Экспорт завершен'); }
    function importChats() { const input = document.createElement('input'); input.type = 'file'; input.accept = 'application/json'; input.onchange = (e) => { const file = e.target.files[0]; const reader = new FileReader(); reader.onload = (event) => { try { const imported = JSON.parse(event.target.result); chats = imported; saveUserData(); renderHistory(); loadChat(Object.keys(chats)[0]); showToast('Импорт завершён'); } catch(err) { showToast('Ошибка импорта', true); } }; reader.readAsText(file); }; input.click(); }
    
    function initLanguageSelector() { const selector = document.getElementById('languageSelector'); selector.innerHTML = ''; for (const [code, name] of Object.entries(languages)) { const btn = document.createElement('button'); btn.className = 'lang-btn' + (code === currentLang ? ' active' : ''); btn.textContent = name; btn.dataset.lang = code; btn.onclick = () => switchLanguage(code); selector.appendChild(btn); } }
    function initApiSelector() { const selector = document.getElementById('apiSelector'); selector.innerHTML = ''; const apis = ['groq', 'cerebras', 'cloudflare', 'gemini']; const icons = { groq: '🚀', cerebras: '⚡', cloudflare: '☁️', gemini: '🤖' }; const names = { groq: 'Groq', cerebras: 'Cerebras', cloudflare: 'Cloudflare', gemini: 'Gemini' }; apis.forEach(api => { const btn = document.createElement('button'); btn.className = 'api-btn' + (api === currentApi ? ' active' : ''); btn.innerHTML = `${icons[api]} ${names[api]}`; btn.dataset.api = api; btn.onclick = () => switchApi(api); selector.appendChild(btn); }); }
    
    function initDarkTheme() {
        const themeToggle = document.createElement('div');
        themeToggle.className = 'theme-toggle';
        themeToggle.innerHTML = localStorage.getItem('theme') === 'dark' ? '☀️' : '🌙';
        themeToggle.onclick = () => { document.body.classList.toggle('dark'); const isDark = document.body.classList.contains('dark'); localStorage.setItem('theme', isDark ? 'dark' : 'light'); themeToggle.innerHTML = isDark ? '☀️' : '🌙'; };
        const headerRight = document.querySelector('.header-right');
        if (headerRight && !document.querySelector('.theme-toggle')) headerRight.appendChild(themeToggle);
        if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
    }
    
    function addPromptExamples() {
        const inputArea = document.querySelector('.input-area');
        if (document.querySelector('.prompt-examples')) return;
        const examplesDiv = document.createElement('div');
        examplesDiv.className = 'prompt-examples';
        examplesDiv.style.cssText = 'display: flex; gap: 8px; flex-wrap: wrap; padding: 0 24px 12px;';
        examplesDiv.innerHTML = `<div class="prompt-chip" data-prompt="Напиши код на Python для сортировки массива">💻 Код</div><div class="prompt-chip" data-prompt="Объясни квантовую физику простыми словами">🔬 Наука</div><div class="prompt-chip" data-prompt="Придумай креативный бизнес-план">💡 Бизнес</div><div class="prompt-chip" data-prompt="Переведи на английский: Привет, как дела?">🌐 Перевод</div>`;
        inputArea.parentNode.insertBefore(examplesDiv, inputArea);
        document.querySelectorAll('.prompt-chip').forEach(chip => { chip.onclick = () => { document.getElementById('userInput').value = chip.dataset.prompt; sendMessage(); }; });
    }
    
    document.getElementById('sendBtn').addEventListener('click', sendMessage);
    document.getElementById('newChatBtn').addEventListener('click', createNewChat);
    document.getElementById('newsTabBtn').addEventListener('click', window.showNewsTab);
    document.getElementById('refreshNewsBtn').addEventListener('click', () => loadNews());
    document.getElementById('closeNewsBtn').addEventListener('click', window.closeNewsTab);
    document.getElementById('loginMenuItem').addEventListener('click', showAuthModal);
    document.getElementById('exportMenuItem').addEventListener('click', exportAllChats);
    document.getElementById('importMenuItem').addEventListener('click', importChats);
    document.getElementById('clearMenuItem').addEventListener('click', clearAllData);
    document.getElementById('logoutMenuItem').addEventListener('click', logout);
    document.getElementById('authSubmitBtn').addEventListener('click', authSubmit);
    document.getElementById('authSwitch').addEventListener('click', toggleAuthMode);
    document.getElementById('shareTelegramBtn').addEventListener('click', shareToTelegram);
    document.getElementById('shareWhatsAppBtn').addEventListener('click', shareToWhatsApp);
    document.getElementById('ShareVKBtn').addEventListener('click', shareToVK);
    document.getElementById('shareTwitterBtn').addEventListener('click', shareToTwitter);
    document.getElementById('copyLinkBtn').addEventListener('click', copyChatLink);
    document.getElementById('closeShareBtn').addEventListener('click', closeShareModal);
    document.getElementById('confirmYesBtn').onclick = () => { if (window._confirmCallback) { window._confirmCallback(); } document.getElementById('customConfirmModal').classList.remove('show'); };
    document.getElementById('confirmNoBtn').onclick = () => document.getElementById('customConfirmModal').classList.remove('show');
    
    const textarea = document.getElementById('userInput');
    textarea.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 120) + 'px'; });
    textarea.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    document.addEventListener('click', (e) => { const menu = document.getElementById('userMenu'); const avatar = document.getElementById('userAvatar'); if (menu && !menu.contains(e.target) && !avatar.contains(e.target)) menu.classList.remove('show'); });
    
    document.getElementById('statsCount').innerText = totalMessages;
    initLanguageSelector();
    initApiSelector();
    updateUserUI();
    loadUserData();
    updateUILanguage();
    updateCurrentModelBadge();
    updateWelcomeMessage();
    initDarkTheme();
    addPromptExamples();
    
    window.createNewChat = createNewChat;
    window.deleteChat = window.deleteChat;
    window.openShareModal = window.openShareModal;
    window.showNewsTab = window.showNewsTab;
    window.closeNewsTab = window.closeNewsTab;
})();
</script>
</body>
