<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognify AI | Multilingual AI Assistant</title>
    <meta name="description" content="Бесплатная нейросеть с поддержкой файлов, видео, аудио и истории чатов">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: #0a0a0a;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #3a3a3a;
            border-radius: 3px;
        }
        
        .app {
            display: flex;
            height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #0f0f0f;
            border-right: 1px solid #1f1f1f;
            display: flex;
            flex-direction: column;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .lang-switch {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        
        .lang-switch:hover {
            background: #2a2a2a;
            border-color: #667eea;
        }
        
        .new-chat-btn {
            margin: 16px;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
        }
        
        .new-chat-btn:hover {
            opacity: 0.9;
            transform: scale(0.98);
        }
        
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }
        
        .history-item {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 4px;
            cursor: pointer;
            color: #9ca3af;
            font-size: 13px;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        
        .history-item:hover {
            background: #1a1a1a;
            color: white;
        }
        
        .history-item.active {
            background: #1a1a1a;
            color: white;
        }
        
        .history-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .history-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .history-item:hover .history-actions {
            opacity: 1;
        }
        
        .history-btn {
            background: transparent;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            font-size: 12px;
        }
        
        .history-btn:hover {
            background: #2a2a2a;
            color: white;
        }
        
        /* Main Chat */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0a0a0a;
        }
        
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid #1f1f1f;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .chat-title {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }
        
        /* API Selector */
        .api-selector {
            display: flex;
            gap: 8px;
            background: #1a1a1a;
            padding: 6px;
            border-radius: 40px;
        }
        
        .api-btn {
            padding: 8px 16px;
            border-radius: 32px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .api-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        /* Messages */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }
        
        .message.user .message-avatar {
            background: #2a2a2a;
        }
        
        .message.bot .message-avatar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .message-content {
            flex: 1;
            color: #e5e7eb;
            line-height: 1.6;
            font-size: 15px;
        }
        
        .message-content p {
            margin-bottom: 8px;
        }
        
        .message-content pre {
            background: #1a1a1a;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        /* Input Area */
        .input-area {
            padding: 20px 24px;
            border-top: 1px solid #1f1f1f;
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            background: #1a1a1a;
            border-radius: 32px;
            padding: 8px 16px;
            align-items: center;
        }
        
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            padding: 8px 0;
            max-height: 120px;
        }
        
        textarea::placeholder {
            color: #4a4a4a;
        }
        
        .file-label {
            background: #2a2a2a;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.2s;
        }
        
        .file-label:hover {
            background: #3a3a3a;
        }
        
        .send-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 24px;
            padding: 8px 20px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .send-btn:hover {
            opacity: 0.9;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .file-badge {
            display: inline-block;
            background: #2a2a2a;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        
        /* Modal for Share */
        .share-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        
        .share-modal.show {
            opacity: 1;
            visibility: visible;
        }
        
        .share-content {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            border: 1px solid #2a2a2a;
        }
        
        .share-content h3 {
            color: white;
            margin-bottom: 20px;
        }
        
        .share-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .share-buttons button {
            background: #2a2a2a;
            border: none;
            border-radius: 12px;
            padding: 10px 16px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .share-buttons button:hover {
            background: #3a3a3a;
        }
        
        .share-link {
            background: #0f0f0f;
            border-radius: 12px;
            padding: 10px;
            display: flex;
            gap: 8px;
        }
        
        .share-link input {
            flex: 1;
            background: transparent;
            border: none;
            color: #9ca3af;
            font-size: 12px;
            outline: none;
        }
        
        .share-link button {
            background: #667eea;
            border: none;
            border-radius: 8px;
            padding: 6px 12px;
            color: white;
            cursor: pointer;
        }
        
        .close-modal {
            width: 100%;
            background: #2a2a2a;
            border: none;
            border-radius: 12px;
            padding: 10px;
            color: white;
            cursor: pointer;
            margin-top: 16px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span>🧠</span> <span data-lang="logo">Cognify AI</span>
                </div>
                <button class="lang-switch" onclick="toggleLanguage()" id="langBtn">🇬🇧 EN</button>
            </div>
            <button class="new-chat-btn" onclick="createNewChat()">
                <span>➕</span> <span data-lang="newChat">Новый чат</span>
            </button>
            <div class="history-list" id="historyList"></div>
        </div>
        
        <!-- Main Chat -->
        <div class="main-chat">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">Новый чат</div>
                <div class="api-selector" id="apiSelector">
                    <button class="api-btn active" data-api="groq">🚀 Groq</button>
                    <button class="api-btn" data-api="gemini">🤖 Gemini</button>
                    <button class="api-btn" data-api="fallback">🔄 Fallback</button>
                </div>
            </div>
            
            <div class="messages-area" id="messagesArea">
                <div class="message bot">
                    <div class="message-avatar">🧠</div>
                    <div class="message-content" id="welcomeMessage">
                        <p>Привет! Я Cognify AI.</p>
                        <p>• <strong>Groq</strong> — только текст (быстро)</p>
                        <p>• <strong>Gemini</strong> — текст + 🖼️ 🎬 🎵 📄</p>
                        <p>• <strong>Fallback</strong> — демо-режим</p>
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <div class="input-container">
                    <label for="fileInput" class="file-label" id="fileLabel" style="display: none;">📎</label>
                    <input type="file" id="fileInput" accept="image/*,video/*,audio/*,.pdf,.txt" style="display: none;">
                    <textarea id="userInput" placeholder="Напиши свой вопрос..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn"><span data-lang="send">Отправить</span></button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Share Modal -->
    <div class="share-modal" id="shareModal">
        <div class="share-content">
            <h3 id="shareTitle">Поделиться чатом</h3>
            <div class="share-buttons">
                <button onclick="shareToTelegram()">📱 Telegram</button>
                <button onclick="shareToWhatsApp()">💬 WhatsApp</button>
                <button onclick="shareToVK()">📘 VK</button>
                <button onclick="shareToTwitter()">🐦 Twitter</button>
                <button onclick="copyChatLink()">🔗 Копировать</button>
            </div>
            <div class="share-link">
                <input type="text" id="shareLinkInput" readonly>
                <button onclick="copyChatLink()">Копировать</button>
            </div>
            <button class="close-modal" onclick="closeShareModal()">Закрыть</button>
        </div>
    </div>

    <script>
        // ============================================
        // НАСТРОЙКИ
        // ============================================
        const WORKER_URL = 'https://groq-proxy.playgame8987.workers.dev';
        
        let currentChatId = Date.now().toString();
        let currentApi = 'groq';
        let currentLang = 'ru';
        let currentFile = null;
        let chats = JSON.parse(localStorage.getItem('chats') || '{}');
        let shareChatId = null;
        
        // ============================================
        // ПЕРЕВОДЫ
        // ============================================
        const translations = {
            ru: {
                logo: 'Cognify AI',
                newChat: 'Новый чат',
                send: 'Отправить',
                placeholder: 'Напиши свой вопрос...',
                welcome: 'Привет! Я Cognify AI.\n\n• <strong>Groq</strong> — только текст (быстро)\n• <strong>Gemini</strong> — текст + 🖼️ 🎬 🎵 📄\n• <strong>Fallback</strong> — демо-режим',
                fileReady: 'Файл готов к отправке',
                type: 'Тип',
                size: 'Размер',
                askQuestion: 'Напиши вопрос об этом файле',
                error: 'Ошибка',
                thinking: 'Думаю...',
                switchedTo: 'Переключено на',
                share: 'Поделиться',
                delete: 'Удалить',
                shareTitle: 'Поделиться чатом'
            },
            en: {
                logo: 'Cognify AI',
                newChat: 'New chat',
                send: 'Send',
                placeholder: 'Type your question...',
                welcome: 'Hi! I\'m Cognify AI.\n\n• <strong>Groq</strong> — text only (fast)\n• <strong>Gemini</strong> — text + 🖼️ 🎬 🎵 📄\n• <strong>Fallback</strong> — demo mode',
                fileReady: 'File ready to send',
                type: 'Type',
                size: 'Size',
                askQuestion: 'Ask a question about this file',
                error: 'Error',
                thinking: 'Thinking...',
                switchedTo: 'Switched to',
                share: 'Share',
                delete: 'Delete',
                shareTitle: 'Share chat'
            }
        };
        
        function t(key) {
            return translations[currentLang][key] || translations.ru[key] || key;
        }
        
        function updateLanguage() {
            document.querySelectorAll('[data-lang]').forEach(el => {
                const key = el.dataset.lang;
                if (key && translations[currentLang][key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        el.placeholder = translations[currentLang][key];
                    } else {
                        el.innerHTML = translations[currentLang][key];
                    }
                }
            });
            
            const welcomeDiv = document.getElementById('welcomeMessage');
            if (welcomeDiv) {
                welcomeDiv.innerHTML = t('welcome');
            }
            
            const textarea = document.getElementById('userInput');
            if (textarea) textarea.placeholder = t('placeholder');
            
            document.getElementById('shareTitle').innerText = t('shareTitle');
            document.getElementById('langBtn').innerHTML = currentLang === 'ru' ? '🇬🇧 EN' : '🇷🇺 RU';
        }
        
        function toggleLanguage() {
            currentLang = currentLang === 'ru' ? 'en' : 'ru';
            localStorage.setItem('language', currentLang);
            updateLanguage();
        }
        
        // ============================================
        // УПРАВЛЕНИЕ ЧАТАМИ
        // ============================================
        function init() {
            const savedLang = localStorage.getItem('language');
            if (savedLang) currentLang = savedLang;
            updateLanguage();
            
            if (!chats[currentChatId]) createNewChat();
            renderHistory();
            loadChat(currentChatId);
            updateFileButton();
        }
        
        function updateFileButton() {
            const fileLabel = document.getElementById('fileLabel');
            if (currentApi === 'gemini') {
                fileLabel.style.display = 'flex';
            } else {
                fileLabel.style.display = 'none';
                currentFile = null;
            }
        }
        
        function createNewChat() {
            currentChatId = Date.now().toString();
            chats[currentChatId] = {
                id: currentChatId,
                title: 'New chat',
                messages: [{ role: 'bot', content: t('welcome') }],
                createdAt: new Date().toISOString()
            };
            saveChats();
            renderHistory();
            loadChat(currentChatId);
        }
        
        function loadChat(chatId) {
            currentChatId = chatId;
            const chat = chats[chatId];
            if (!chat) return;
            
            document.getElementById('chatTitle').innerText = chat.title;
            const messagesArea = document.getElementById('messagesArea');
            messagesArea.innerHTML = '';
            chat.messages.forEach(msg => addMessageToUI(msg.content, msg.role === 'user'));
            
            document.querySelectorAll('.history-item').forEach(el => {
                el.classList.remove('active');
                if (el.dataset.id === chatId) el.classList.add('active');
            });
        }
        
        function addMessageToUI(text, isUser) {
            const messagesArea = document.getElementById('messagesArea');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            messageDiv.innerHTML = `
                <div class="message-avatar">${isUser ? '👤' : '🧠'}</div>
                <div class="message-content">${formatMessage(text)}</div>
            `;
            messagesArea.appendChild(messageDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
        }
        
        function formatMessage(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }
        
        function saveMessage(text, isUser) {
            const chat = chats[currentChatId];
            if (!chat) return;
            chat.messages.push({ role: isUser ? 'user' : 'bot', content: text });
            if (chat.messages.length === 2 && isUser) {
                chat.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
                document.getElementById('chatTitle').innerText = chat.title;
            }
            saveChats();
            renderHistory();
        }
        
        function saveChats() {
            localStorage.setItem('chats', JSON.stringify(chats));
        }
        
        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            const sorted = Object.values(chats).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            sorted.forEach(chat => {
                const item = document.createElement('div');
                item.className = 'history-item' + (chat.id === currentChatId ? ' active' : '');
                item.dataset.id = chat.id;
                item.innerHTML = `
                    <span class="history-title">${escapeHtml(chat.title)}</span>
                    <div class="history-actions">
                        <button class="history-btn" onclick="event.stopPropagation(); openShareModal('${chat.id}')" title="${t('share')}">🔗</button>
                        <button class="history-btn" onclick="event.stopPropagation(); deleteChat('${chat.id}')" title="${t('delete')}">🗑️</button>
                    </div>
                `;
                item.onclick = () => loadChat(chat.id);
                historyList.appendChild(item);
            });
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function deleteChat(chatId) {
            delete chats[chatId];
            saveChats();
            const remaining = Object.keys(chats);
            if (remaining.length === 0) createNewChat();
            else loadChat(remaining[0]);
            renderHistory();
        }
        
        // ============================================
        // ОТПРАВКА СООБЩЕНИЙ
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const question = input.value.trim();
            if (!question && !currentFile) return;
            
            let userMsg = question;
            if (currentFile) userMsg += `\n\n📎 ${t('fileReady')}: ${currentFile.name} (${(currentFile.size / 1024 / 1024).toFixed(2)} MB)`;
            addMessageToUI(userMsg, true);
            saveMessage(userMsg, true);
            
            input.value = '';
            input.style.height = 'auto';
            
            const loadingId = 'loading-' + Date.now();
            const messagesArea = document.getElementById('messagesArea');
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message bot';
            loadingDiv.id = loadingId;
            loadingDiv.innerHTML = `<div class="message-avatar">🧠</div><div class="message-content"><div class="loading"></div> ${t('thinking')}</div>`;
            messagesArea.appendChild(loadingDiv);
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            let answer;
            try {
                if (currentApi === 'groq') {
                    const response = await fetch(`${WORKER_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: question, api: 'groq' })
                    });
                    const data = await response.json();
                    answer = data.answer || data.error || t('error');
                }
                else if (currentApi === 'gemini' && currentFile) {
                    const formData = new FormData();
                    formData.append('file', currentFile);
                    formData.append('question', question || t('askQuestion'));
                    formData.append('api', 'gemini');
                    const response = await fetch(`${WORKER_URL}/upload`, { method: 'POST', body: formData });
                    const data = await response.json();
                    answer = data.answer || data.error || t('error');
                    currentFile = null;
                    document.getElementById('fileInput').value = '';
                }
                else if (currentApi === 'gemini') {
                    const response = await fetch(`${WORKER_URL}/chat`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: question, api: 'gemini' })
                    });
                    const data = await response.json();
                    answer = data.answer || data.error || t('error');
                }
                else {
                    answer = `🔁 Fallback: "${question || 'File uploaded'}"\n\nChoose Groq or Gemini for real AI!`;
                }
            } catch (err) {
                answer = `❌ ${t('error')}: ${err.message}`;
            }
            
            document.getElementById(loadingId)?.remove();
            addMessageToUI(answer, false);
            saveMessage(answer, false);
        }
        
        // ============================================
        // API SELECTOR
        // ============================================
        function switchApi(api) {
            currentApi = api;
            document.querySelectorAll('.api-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.api === api) btn.classList.add('active');
            });
            updateFileButton();
            const names = { groq: '🚀 Groq', gemini: '🤖 Gemini', fallback: '🔄 Fallback' };
            const msg = `${t('switchedTo')} ${names[api]}`;
            addMessageToUI(msg, false);
            saveMessage(msg, false);
        }
        
        // ============================================
        // SHARE FUNCTIONS
        // ============================================
        function openShareModal(chatId) {
            shareChatId = chatId;
            const chat = chats[chatId];
            if (!chat) return;
            
            const chatText = chat.messages.map(m => `${m.role === 'user' ? '👤' : '🧠'}: ${m.content}`).join('\n\n');
            const encoded = encodeURIComponent(chatText);
            const shareUrl = `${window.location.origin}${window.location.pathname}?share=${chatId}`;
            
            document.getElementById('shareLinkInput').value = shareUrl;
            document.getElementById('shareModal').classList.add('show');
        }
        
        function closeShareModal() {
            document.getElementById('shareModal').classList.remove('show');
        }
        
        function getChatText() {
            const chat = chats[shareChatId];
            if (!chat) return '';
            return chat.messages.map(m => `${m.role === 'user' ? '👤' : '🧠'}: ${m.content}`).join('\n\n');
        }
        
        function shareToTelegram() {
            const text = encodeURIComponent(getChatText());
            window.open(`https://t.me/share/url?url=${encodeURIComponent(window.location.href)}&text=${text}`, '_blank');
        }
        
        function shareToWhatsApp() {
            const text = encodeURIComponent(getChatText());
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
        
        function shareToVK() {
            const text = encodeURIComponent(getChatText());
            window.open(`https://vk.com/share.php?url=${encodeURIComponent(window.location.href)}&title=Cognify%20AI&description=${text}`, '_blank');
        }
        
        function shareToTwitter() {
            const text = encodeURIComponent(getChatText());
            window.open(`https://twitter.com/intent/tweet?text=${text}`, '_blank');
        }
        
        function copyChatLink() {
            const input = document.getElementById('shareLinkInput');
            input.select();
            document.execCommand('copy');
            alert(currentLang === 'ru' ? 'Ссылка скопирована!' : 'Link copied!');
        }
        
        // ============================================
        // EVENTS
        // ============================================
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.querySelectorAll('.api-btn').forEach(btn => {
            btn.addEventListener('click', () => switchApi(btn.dataset.api));
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            currentFile = file;
            addMessageToUI(`📎 ${t('fileReady')}: **${file.name}**\n📁 ${t('type')}: ${file.type}\n📊 ${t('size')}: ${(file.size / 1024 / 1024).toFixed(2)} MB\n\n${t('askQuestion')}`, false);
        });
        
        const textarea = document.getElementById('userInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        textarea.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        init();
    </script>
</body>
</html>
